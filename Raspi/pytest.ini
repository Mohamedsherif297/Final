[pytest]
# Run from: /home/pi/Final/Raspi/
# Command:  pytest tests/ -v

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marks declared (avoids unknown mark warnings)
markers =
    hardware: requires physical GPIO hardware on Raspberry Pi
    mqtt: requires running MQTT broker (mosquitto)
    websocket: requires main.py running on Pi
    camera: requires Pi Camera Module connected
    slow: test takes more than 5 seconds

# Default output verbosity
addopts = -v --tb=short

# Timeout per test (requires pytest-timeout: pip install pytest-timeout)
# timeout = 30
